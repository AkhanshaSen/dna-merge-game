<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🧬 DNA Merge — Species Survival Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div id="wrap">
  <header class="hdr anim-up">
    <span class="hdr-icon">🧬</span>
    <h1 class="hdr-title">DNA Merge</h1>
    <p class="hdr-sub">Species Survival Engine — Save the Endangered</p>
    <div class="hdr-tags">
      <span class="tag tag-b">🌍 12 Species · 36 Founders</span>
      <span class="tag tag-g">💾 LocalStorage Save</span>
      <span class="tag tag-a">⚗️ 3 Crosses × 4 Life Stages</span>
    </div>
  </header>

  <div class="stats anim-up s1" id="stats"></div>

  <nav class="tabs anim-up s2" id="tabs">
    <button type="button" class="tb on" data-v="lab">🧬 Gene Lab</button>
    <button type="button" class="tb" data-v="records">📋 Records</button>
    <button type="button" class="tb" data-v="history">📜 History</button>
    <button type="button" class="tb" data-v="settings">⚙️ Settings</button>
  </nav>

  <main id="main"></main>
</div>

<div id="toast-root" aria-live="polite"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
