<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DNA Merge — Species Survival Engine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
</head>
<body>
<div id="scene-root" aria-hidden="true"></div>
<div class="app-shell">
  <aside id="sidebar" class="app-sidebar"></aside>
  <div class="app-main">
    <header id="mission-band" class="app-mission"></header>
    <div class="app-body">
      <main id="main" class="app-content"></main>
      <aside id="stats-rail" class="app-rail"></aside>
    </div>
  </div>
</div>

<nav class="mobile-tabs" id="mobile-tabs" aria-label="Mobile navigation">
  <button type="button" class="tb on" data-v="lab">Lab</button>
  <button type="button" class="tb" data-v="records">Records</button>
  <button type="button" class="tb" data-v="history">History</button>
  <button type="button" class="tb" data-v="settings">Settings</button>
</nav>

<div id="toast-root" aria-live="polite"></div>
<div id="tutorial-root"></div>
<div id="devil-root"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
